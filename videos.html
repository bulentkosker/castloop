<!DOCTYPE html>
<html lang="en" id="htmlRoot">
<head>
  <meta charset="UTF-8">
  <script>document.documentElement.setAttribute("data-theme", localStorage.getItem("cl_theme") || "dark");</script>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castloop - Videos</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%27g%27%20x1%3D%270%25%27%20y1%3D%270%25%27%20x2%3D%27100%25%27%20y2%3D%27100%25%27%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%270%25%27%20style%3D%27stop-color%3A%25236366f1%27/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%27100%25%27%20style%3D%27stop-color%3A%2523818cf8%27/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%20%20%3C/defs%3E%0A%20%20%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2722%27%20fill%3D%27url%28%2523g%29%27/%3E%0A%20%20%3Cpath%20d%3D%27M20%2050%20Q32%2028%2050%2050%20Q68%2072%2080%2050%27%20stroke%3D%27white%27%20stroke-width%3D%277%27%20fill%3D%27none%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%0A%20%20%3Ccircle%20cx%3D%2750%27%20cy%3D%2750%27%20r%3D%277%27%20fill%3D%27white%27/%3E%0A%20%20%3Ccircle%20cx%3D%2720%27%20cy%3D%2750%27%20r%3D%274%27%20fill%3D%27white%27%20opacity%3D%270.7%27/%3E%0A%20%20%3Ccircle%20cx%3D%2780%27%20cy%3D%2750%27%20r%3D%274%27%20fill%3D%27white%27%20opacity%3D%270.7%27/%3E%0A%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    /* ── Navbar ── */
    /* Inter loaded in head */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; transition: background 0.3s, color 0.3s; }
    :root { --bg:#0f0f1a; --bg2:#1a1a2e; --bg3:#252540; --border:#2a2a3e; --accent:#6366f1; --accent2:#818cf8; --text:#f0f0ff; --muted:#6b6b8a; --green:#34d399; --red:#f87171; }
    [data-theme="light"] { --bg:#f4f4ff; --bg2:#ffffff; --bg3:#eeeeff; --border:#ddddf0; --accent:#6366f1; --accent2:#4f46e5; --text:#1a1a2e; --muted:#6b6b8a; --green:#059669; --red:#dc2626; }

    .navbar {
      background: var(--bg2);
      padding: 0 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      height: 60px;
      position: sticky;
      top: 0;
      z-index: 50;
      backdrop-filter: blur(10px);
    }
    .navbar h1 {
      font-size: 20px;
      font-weight: 700;
      color: var(--accent);
      letter-spacing: -0.5px;
      flex-shrink: 0;
    }
    .nav-links {
      display: flex;
      align-items: stretch;
      gap: 0;
      height: 100%;
      margin: 0 24px;
    }
    .nav-links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      padding: 0 16px;
      display: flex;
      align-items: center;
      border-bottom: 2px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .nav-links a:hover { color: var(--text); border-color: var(--border); }
    .nav-links a.active { color: var(--accent2); border-color: var(--accent); }

    .navbar .user-info { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
    .navbar .user-email { color: var(--muted); font-size: 12px; min-width: 140px; max-width: 180px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; display: inline-block; }
    .navbar button {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      padding: 6px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.15s;
      white-space: nowrap;
      font-family: inherit;
    }
    .navbar button:hover { border-color: var(--accent); color: var(--text); }
    /* User dropdown */
    .user-menu { position: relative; }
    .user-menu-btn {
      display: flex; align-items: center; gap: 8px;
      cursor: pointer; padding: 6px 12px; border-radius: 8px;
      border: 1px solid var(--border); background: transparent;
      color: var(--text); font-size: 13px; font-family: inherit;
      transition: all 0.15s; white-space: nowrap; max-width: 200px;
    }
    .user-menu-btn:hover { border-color: var(--accent); background: rgba(99,102,241,0.05); }
    .user-menu-btn .avatar {
      width: 26px; height: 26px; border-radius: 50%;
      background: var(--accent); color: #fff;
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .user-menu-btn .email-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .user-menu-btn .chevron { color: var(--muted); font-size: 10px; flex-shrink: 0; transition: transform 0.2s; }
    .user-menu.open .chevron { transform: rotate(180deg); }
    .user-dropdown {
      position: absolute; top: calc(100% + 8px); right: 0;
      background: var(--bg2); border: 1px solid var(--border);
      border-radius: 10px; min-width: 200px; z-index: 200;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0; pointer-events: none; transform: translateY(-8px);
      transition: all 0.15s;
    }
    .user-menu.open .user-dropdown { opacity: 1; pointer-events: all; transform: translateY(0); }
    .dropdown-header { padding: 12px 16px; border-bottom: 1px solid var(--border); }
    .dropdown-header .d-email { font-size: 12px; color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .dropdown-header .d-plan { font-size: 11px; color: var(--accent2); font-weight: 600; margin-top: 2px; }
    .dropdown-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 16px; font-size: 13px; color: var(--text);
      cursor: pointer; transition: background 0.15s; border: none;
      background: transparent; width: 100%; text-align: left; font-family: inherit;
    }
    .dropdown-item:hover { background: rgba(99,102,241,0.08); }
    .dropdown-item.danger { color: var(--red); }
    .dropdown-item.danger:hover { background: rgba(248,113,113,0.08); }
    .dropdown-item .d-icon { font-size: 15px; width: 20px; text-align: center; }
    .dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

    .theme-toggle { padding: 6px 10px !important; font-size: 15px !important; }

    @media (max-width: 600px) {
      .navbar { padding: 0 16px; }
      .navbar .user-email { display: none; }
      .nav-links { margin: 0 8px; }
      .nav-links a { padding: 0 10px; font-size: 12px; }
    }
    .main { padding: 32px; max-width: 1100px; margin: 0 auto; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-header h2 { font-size: 18px; font-weight: 600; }
    .upload-area { background: #1a1a2e; border: 2px dashed #2a2a3e; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 32px; }
    .upload-area:hover, .upload-area.dragover { border-color: #6366f1; }
    .upload-area .icon { font-size: 40px; margin-bottom: 12px; }
    .upload-area p { color: #888; font-size: 14px; margin-bottom: 16px; }
    .upload-area span { color: #555; font-size: 12px; }
    .btn-primary { background: #6366f1; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #4f46e5; }
    input[type="file"] { display: none; }
    .progress-container { display: none; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .progress-container.active { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .progress-bar { background: #2a2a3e; border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-fill { background: #6366f1; height: 100%; width: 0%; transition: width 0.3s; border-radius: 4px; }
    .progress-actions { margin-top: 12px; display: flex; justify-content: flex-end; }

    .btn-cancel-upload:hover { background: rgba(248, 113, 113, 0.12); }

    .video-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; }
    .video-card .video-icon { font-size: 32px; margin-bottom: 12px; }
    .video-card .video-original-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #fff; }
    .video-card .video-size { font-size: 11px; color: #6366f1; margin-bottom: 4px; }
    .video-card .video-meta { font-size: 11px; color: #9ca3af; margin-bottom: 8px; }
    .video-card .video-path { font-size: 10px; color: #444; margin-bottom: 12px; word-break: break-all; }
    .video-actions { display: flex; gap: 8px; }
    .btn-delete { background: transparent; color: #f87171; border: 1px solid #f87171; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-copy { background: #6366f1; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-copy:hover { background: #4f46e5; }
    .empty-state { background: #1a1a2e; border: 1px dashed #2a2a3e; border-radius: 12px; padding: 48px; text-align: center; color: #555; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .message { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .message.success { background: #064e3b; color: #34d399; display: block; }
    .message.error { background: #450a0a; color: #f87171; display: block; }
    .storage-bar-wrap{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:10px;padding:16px 20px;margin-bottom:24px;display:flex;align-items:center;gap:16px;}
    .storage-info{flex:1;}
    .storage-label{font-size:12px;color:#888;margin-bottom:6px;display:flex;justify-content:space-between;}
    .storage-bar{background:#0f0f1a;border-radius:4px;height:8px;overflow:hidden;}
    .storage-fill{height:100%;border-radius:4px;background:#6366f1;transition:width 0.5s;}
    .storage-fill.warning{background:#fbbf24;}
    .storage-fill.danger{background:#f87171;}

    /* Custom Modal */
    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.2s;}
    .modal-overlay.active{opacity:1;pointer-events:all;}
    .modal-box{background:#1a1a2e;border:1px solid #2a2a3e;border-radius:14px;padding:32px;max-width:400px;width:90%;transform:scale(0.95);transition:transform 0.2s;}
    .modal-overlay.active .modal-box{transform:scale(1);}
    .modal-title{font-size:16px;font-weight:700;margin-bottom:8px;}
    .modal-msg{font-size:14px;color:#888;margin-bottom:24px;line-height:1.6;}
    .modal-actions{display:flex;gap:10px;justify-content:flex-end;}
    .modal-cancel{background:transparent;border:1px solid #2a2a3e;color:#aaa;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;}
    .modal-cancel:hover{border-color:#6366f1;color:#fff;}
    .modal-confirm{background:#f87171;border:none;color:#fff;padding:8px 18px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600;}
    .modal-confirm:hover{background:#ef4444;}
    .modal-confirm.info{background:#6366f1;}
    .modal-confirm.info:hover{background:#4f46e5;}
    .toast{position:fixed;bottom:24px;right:24px;background:#1a1a2e;border:1px solid #2a2a3e;color:#fff;padding:12px 20px;border-radius:10px;font-size:13px;z-index:2000;transform:translateY(20px);opacity:0;transition:all 0.3s;pointer-events:none;}
    .toast.active{transform:translateY(0);opacity:1;}
    .toast.success{border-color:#34d399;color:#34d399;}
    .toast.error{border-color:#f87171;color:#f87171;}

  </style>
</head>
<body>
  <div class="navbar">
    <h1>Castloop</h1>
    <div class="nav-links">
      <a href="dashboard.html">Streams</a>
      <a href="videos.html" class="active">Videos</a>
    </div>
    <div class="user-info">
      
      <div class="user-menu" id="userMenu">
        <button class="user-menu-btn" onclick="toggleUserMenu(event)">
          <div class="avatar" id="userAvatar">?</div>

    </div>

  <div class="main">
    <div class="section-header"><h2>My Videos</h2></div>
    <div class="storage-bar-wrap" id="storageWrap" style="display:none">
      <div class="storage-info">
        <div class="storage-label">
          <span>Storage</span>
          <span id="storageText">Loading...</span>
        </div>
        <div class="storage-bar"><div class="storage-fill" id="storageFill" style="width:0%"></div></div>
      </div>

    <div class="message" id="message"></div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🎬</div>

      <span>MP4, MOV, AVI, MKV — Max 10GB</span>
      <br><br>
      <button class="btn-primary" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Choose File</button>

      </div>

    <div id="videosContainer">
      <div class="empty-state"><div class="icon">🎬</div><p>No videos yet. Upload your first video!</p></div>
    </div>
  </div>


  <!-- Modal -->
  <div class="modal-overlay" id="modalOverlay">
    <div class="modal-box">
      <div class="modal-title" id="modalTitle">Confirm</div>
      <div class="modal-msg" id="modalMsg"></div>
      <div class="modal-actions">
        <button class="modal-cancel" id="modalCancel">Cancel</button>
        <button class="modal-confirm" id="modalConfirm">Delete</button>
      </div>
    </div>
  </div>
  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <script>

    // ── Modal & Toast ──────────────────────────────────────────────────────────
    function showModal(title, msg, confirmText, confirmClass, onConfirm) {
      document.getElementById('modalTitle').textContent = title;
      document.getElementById('modalMsg').textContent = msg;
      const btn = document.getElementById('modalConfirm');
      btn.textContent = confirmText;
      btn.className = 'modal-confirm ' + (confirmClass || '');
      document.getElementById('modalOverlay').classList.add('active');
      btn.onclick = () => { hideModal(); onConfirm(); };
      document.getElementById('modalCancel').onclick = hideModal;
      document.getElementById('modalOverlay').onclick = (e) => { if (e.target.id === 'modalOverlay') hideModal(); };
    }
    function hideModal() { document.getElementById('modalOverlay').classList.remove('active'); }
    function toast(msg, type) {
      const t = document.getElementById('toast');
      t.textContent = msg; t.className = 'toast active ' + (type||'');
      setTimeout(() => t.className = 'toast', 3000);
    }

    const SUPABASE_URL = 'https://pdttjblnvxoitskhdtro.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vxcNOoezd_FKxKWmWj-rZQ_w3IrSMaG';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const SERVER_URL = 'https://api.castloop.tv';
    const API_KEY = 'castloop-secret-2024';
    let currentUser = null;
    let currentUploadXhr = null;

    let userPlan = 'free';

    async function init() {
      const { data: { user } } = await client.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      document.getElementById('userEmail').textContent = user.email;
      document.getElementById('dropEmail').textContent = user.email;
      document.getElementById('userAvatar').textContent = (user.email || '?')[0].toUpperCase();
      // Plan al
      const { data: profile } = await client.from('profiles').select('plan').eq('id', user.id).single();
      userPlan = (profile?.plan || 'free').toLowerCase();
      await loadVideos();
      await loadStorage();
    }

    async function loadStorage() {
      try {
        const res = await fetch(`${SERVER_URL}/storage`, {
          headers: { 'x-api-key': API_KEY, 'x-user-id': currentUser.id, 'x-user-plan': userPlan }
        });
        const data = await res.json();
        const usedGB = (data.used / (1024**3)).toFixed(2);
        const limitGB = (data.limit / (1024**3)).toFixed(0);
        const pct = Math.min(100, Math.round((data.used / data.limit) * 100));
        document.getElementById('storageWrap').style.display = '';
        document.getElementById('storageText').textContent = `${usedGB} GB / ${limitGB} GB (${pct}%)`;
        const fill = document.getElementById('storageFill');
        fill.style.width = pct + '%';
        fill.className = 'storage-fill' + (pct > 90 ? ' danger' : pct > 70 ? ' warning' : '');
      } catch(e) { console.debug('Storage check failed:', e); }
    }

    async function loadVideos() {
      const res = await fetch(`${SERVER_URL}/videos`, {
        headers: { 'x-api-key': API_KEY, 'x-user-id': currentUser.id }
      });
      const videos = await res.json();
      renderVideos(videos);
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function formatDuration(totalSeconds) {
      const seconds = Number(totalSeconds);
      if (!Number.isFinite(seconds) || seconds < 0) return '00:00:00';

      const h = Math.floor(seconds / 3600);
      const m = Math.floor((seconds % 3600) / 60);
      const s = Math.floor(seconds % 60);

      return [h, m, s].map((n) => String(n).padStart(2, '0')).join(':');
    }

    function toFiniteNumber(...values) {
      for (const value of values) {
        const n = Number(value);
        if (Number.isFinite(n) && n >= 0) return n;
      }
      return null;
    }

    function getServerDuration(video) {
      return toFiniteNumber(video.duration, video.durationSeconds, video.duration_sec, video.length);
    }

    function getMetaLine(video, fpsValue, durationValue) {
      const width = toFiniteNumber(video.width) || 0;
      const height = toFiniteNumber(video.height) || 0;
      const resolution = width > 0 && height > 0 ? `${width}x${height}` : 'Unknown';
      const fps = Number.isFinite(fpsValue) && fpsValue > 0 ? `${Math.round(fpsValue)}fps` : '--fps';
      const duration = Number.isFinite(durationValue) && durationValue >= 0
        ? formatDuration(durationValue)
        : formatDuration(getServerDuration(video));

      return `${resolution} • ${fps} • ${duration}`;
    }

    function makeMetaId(video, index) {
      const base = String(video.filename || video.originalName || video.path || `video-${index}`)
        .replace(/[^a-zA-Z0-9_-]/g, '_');
      return `video-meta-${base}-${index}`;
    }

    function getVideoSourceUrl(video) {
      if (video.url) return video.url;
      if (video.publicUrl) return video.publicUrl;
      if (video.webUrl) return video.webUrl;
      if (video.streamUrl) return video.streamUrl;
      if (video.filename) return `${SERVER_URL}/videos/${encodeURIComponent(video.filename)}`;
      return null;
    }

    function readApproxFps(videoEl) {
      const quality = videoEl.getVideoPlaybackQuality ? videoEl.getVideoPlaybackQuality() : null;
      if (quality && Number.isFinite(quality.totalVideoFrames) && quality.totalVideoFrames > 0 && videoEl.duration > 0) {
        return quality.totalVideoFrames / videoEl.duration;
      }

      if (Number.isFinite(videoEl.webkitDecodedFrameCount) && videoEl.webkitDecodedFrameCount > 0 && videoEl.duration > 0) {
        return videoEl.webkitDecodedFrameCount / videoEl.duration;
      }

      return null;
    }

    function hydrateVideoMeta(videos) {
      videos.forEach((video, index) => {
        const sourceUrl = getVideoSourceUrl(video);
        if (!sourceUrl) return;

        const metaId = makeMetaId(video, index);
        const target = document.getElementById(metaId);
        if (!target) return;

        const el = document.createElement('video');
        el.preload = 'metadata';
        el.muted = true;
        el.src = sourceUrl;

        el.onloadedmetadata = () => {
          const duration = Number.isFinite(el.duration) ? el.duration : getServerDuration(video);
          const fps = readApproxFps(el);
          target.textContent = getMetaLine(video, fps, duration);
          el.removeAttribute('src');
          el.load();
        };

        el.onerror = () => {
          target.textContent = getMetaLine(video, null, getServerDuration(video));
        };
      });
    }

    function renderVideos(videos) {
      const container = document.getElementById('videosContainer');
      if (!videos.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>No videos yet. Upload your first video!</p></div>`;
        return;
      }
      container.innerHTML = `<div class="videos-grid">${videos.map((v, i) => {
        const metaId = makeMetaId(v, i);
        return `
        <div class="video-card">
          <div class="video-icon">🎬</div>
          <div class="video-original-name">${v.originalName || v.filename}</div>
          ${v.size ? `<div class="video-size">${formatSize(v.size)}</div>` : ''}
          <div class="video-meta" id="${metaId}">${getMetaLine(v, null, getServerDuration(v))}</div>
          <div class="video-path">${v.path}</div>
          <div class="video-actions">
            <button class="btn-copy" onclick="copyPath('${v.path}', this)">📋 Copy Path</button>
            <button class="btn-delete" onclick="deleteVideo('${v.filename}')">Delete</button>
          </div>
        </div>`;
      }).join('')}
      </div>`;

      hydrateVideoMeta(videos);
    }

    async function uploadVideo(file) {
      if (!file) return;
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressPercent = document.getElementById('progressPercent');
      const progressFilename = document.getElementById('progressFilename');
      const cancelUploadBtn = document.getElementById('cancelUploadBtn');
      progressContainer.classList.add('active');
      progressFilename.textContent = file.name;
      progressFill.style.width = '0%';
      progressPercent.textContent = '0%';
      cancelUploadBtn.disabled = false;

      const formData = new FormData();
      formData.append('video', file);
      formData.append('originalName', file.name);

      const xhr = new XMLHttpRequest();
      currentUploadXhr = xhr;
      xhr.open('POST', `${SERVER_URL}/upload`);
      xhr.setRequestHeader('x-api-key', API_KEY);
      xhr.setRequestHeader('x-user-id', currentUser.id);
      xhr.setRequestHeader('x-user-plan', userPlan);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressPercent.textContent = pct + '%';
        }
      };

      xhr.onload = async () => {
        currentUploadXhr = null;
        cancelUploadBtn.disabled = true;
        progressContainer.classList.remove('active');
        progressFill.style.width = '0%';
        progressPercent.textContent = '0%';
        if (xhr.status === 200) {
          toast('✅ Video uploaded: ' + file.name, 'success');
          await loadVideos();
        } else {
          toast('Upload failed. Try again.', 'error');
        }
      };

      xhr.onerror = () => {
        currentUploadXhr = null;
        cancelUploadBtn.disabled = true;
        progressContainer.classList.remove('active');
        progressFill.style.width = '0%';
        progressPercent.textContent = '0%';
        toast('Upload failed. Check server connection.', 'error');
      };

      xhr.onabort = () => {
        currentUploadXhr = null;
        cancelUploadBtn.disabled = true;
        progressContainer.classList.remove('active');
        progressFill.style.width = '0%';
        progressPercent.textContent = '0%';
        toast('Upload cancelled');
      };

      xhr.send(formData);
    }

    function cancelUpload() {
      if (currentUploadXhr) currentUploadXhr.abort();
    }

    async function deleteVideo(filename) {
      showModal('Delete Video', 'Are you sure you want to delete this video? This cannot be undone.', 'Delete', '', async () => {
        const res = await fetch(`${SERVER_URL}/videos/${encodeURIComponent(filename)}`, {
          method: 'DELETE',
          headers: { 'x-api-key': API_KEY, 'x-user-id': currentUser.id }
        });
        if (res.ok) { toast('Video deleted.', 'success'); await loadVideos(); }
      });
    }

    function copyPath(path, btn) {
      navigator.clipboard.writeText(path);
      const original = btn.textContent;
      btn.textContent = '✅ Copied!';
      btn.style.background = '#064e3b';
      setTimeout(() => { btn.textContent = original; btn.style.background = ''; }, 2000);
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      setTimeout(() => { msg.className = 'message'; }, 4000);
    }

    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) uploadVideo(file);
    });

    async function logout() { await client.auth.signOut(); window.location.href = 'login.html'; }

    // ── Theme ─────────────────────────────────────────────────────────────────
    function toggleTheme() {
      const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
      const newTheme = isDark ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', newTheme);
      localStorage.setItem('cl_theme', newTheme);
      updateThemeUI(newTheme);
    }
    function updateThemeUI(theme) {
      const icon = document.getElementById('themeIcon');
      const label = document.getElementById('themeLabel');
      if (icon) icon.textContent = theme === 'light' ? '☀️' : '🌙';
      if (label) label.textContent = theme === 'light' ? 'Light Mode' : 'Dark Mode';
    }
    (function() {
      const t = localStorage.getItem('cl_theme') || 'dark';
      document.documentElement.setAttribute('data-theme', t);
      document.addEventListener('DOMContentLoaded', () => updateThemeUI(t));
    })();

    // ── User dropdown ──────────────────────────────────────────────────────────
    function toggleUserMenu(e) {
      e.stopPropagation();
      document.getElementById('userMenu').classList.toggle('open');
    }
    function closeUserMenu() {
      document.getElementById('userMenu').classList.remove('open');
    }
    document.addEventListener('click', (e) => {
      const menu = document.getElementById('userMenu');
      if (menu && !menu.contains(e.target)) closeUserMenu();
    });
    init();
  </script>
</body>
</html>
