<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castloop - Videos</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%27g%27%20x1%3D%270%25%27%20y1%3D%270%25%27%20x2%3D%27100%25%27%20y2%3D%27100%25%27%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%270%25%27%20style%3D%27stop-color%3A%25236366f1%27/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%27100%25%27%20style%3D%27stop-color%3A%2523818cf8%27/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%20%20%3C/defs%3E%0A%20%20%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2722%27%20fill%3D%27url%28%2523g%29%27/%3E%0A%20%20%3Cpath%20d%3D%27M20%2050%20Q32%2028%2050%2050%20Q68%2072%2080%2050%27%20stroke%3D%27white%27%20stroke-width%3D%277%27%20fill%3D%27none%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%0A%20%20%3Ccircle%20cx%3D%2750%27%20cy%3D%2750%27%20r%3D%277%27%20fill%3D%27white%27/%3E%0A%20%20%3Ccircle%20cx%3D%2720%27%20cy%3D%2750%27%20r%3D%274%27%20fill%3D%27white%27%20opacity%3D%270.7%27/%3E%0A%20%20%3Ccircle%20cx%3D%2780%27%20cy%3D%2750%27%20r%3D%274%27%20fill%3D%27white%27%20opacity%3D%270.7%27/%3E%0A%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0f1a; color: #fff; min-height: 100vh; }
    .navbar { background: #1a1a2e; padding: 16px 32px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2a2a3e; }
    .navbar h1 { font-size: 22px; font-weight: 700; color: #6366f1; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a { color: #888; text-decoration: none; font-size: 14px; transition: color 0.2s; }
    .nav-links a:hover, .nav-links a.active { color: #fff; }
    .navbar .user-info { display: flex; align-items: center; gap: 16px; }
    .navbar .user-email { color: #888; font-size: 13px; }
    .navbar button { background: transparent; border: 1px solid #2a2a3e; color: #aaa; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 13px; }
    .navbar button:hover { border-color: #6366f1; color: #fff; }
    .main { padding: 32px; max-width: 1100px; margin: 0 auto; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .section-header h2 { font-size: 18px; font-weight: 600; }
    .upload-area { background: #1a1a2e; border: 2px dashed #2a2a3e; border-radius: 12px; padding: 48px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 32px; }
    .upload-area:hover, .upload-area.dragover { border-color: #6366f1; }
    .upload-area .icon { font-size: 40px; margin-bottom: 12px; }
    .upload-area p { color: #888; font-size: 14px; margin-bottom: 16px; }
    .upload-area span { color: #555; font-size: 12px; }
    .btn-primary { background: #6366f1; color: #fff; border: none; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; transition: background 0.2s; }
    .btn-primary:hover { background: #4f46e5; }
    input[type="file"] { display: none; }
    .progress-container { display: none; background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; margin-bottom: 24px; }
    .progress-container.active { display: block; }
    .progress-label { display: flex; justify-content: space-between; font-size: 13px; color: #aaa; margin-bottom: 8px; }
    .progress-bar { background: #2a2a3e; border-radius: 4px; height: 8px; overflow: hidden; }
    .progress-fill { background: #6366f1; height: 100%; width: 0%; transition: width 0.3s; border-radius: 4px; }
    .videos-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
    .video-card { background: #1a1a2e; border: 1px solid #2a2a3e; border-radius: 12px; padding: 20px; }
    .video-card .video-icon { font-size: 32px; margin-bottom: 12px; }
    .video-card .video-original-name { font-size: 14px; font-weight: 600; margin-bottom: 4px; color: #fff; }
    .video-card .video-size { font-size: 11px; color: #6366f1; margin-bottom: 4px; }
    .video-card .video-path { font-size: 10px; color: #444; margin-bottom: 12px; word-break: break-all; }
    .video-actions { display: flex; gap: 8px; }
    .btn-delete { background: transparent; color: #f87171; border: 1px solid #f87171; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; }
    .btn-copy { background: #6366f1; color: #fff; border: none; padding: 6px 14px; border-radius: 6px; font-size: 12px; cursor: pointer; font-weight: 600; }
    .btn-copy:hover { background: #4f46e5; }
    .empty-state { background: #1a1a2e; border: 1px dashed #2a2a3e; border-radius: 12px; padding: 48px; text-align: center; color: #555; }
    .empty-state .icon { font-size: 40px; margin-bottom: 12px; }
    .empty-state p { font-size: 14px; }
    .message { padding: 12px 16px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .message.success { background: #064e3b; color: #34d399; display: block; }
    .message.error { background: #450a0a; color: #f87171; display: block; }
  </style>
</head>
<body>
  <div class="navbar">
    <h1>Castloop</h1>
    <div class="nav-links">
      <a href="dashboard.html">Streams</a>
      <a href="videos.html" class="active">Videos</a>
    </div>
    <div class="user-info">
      <span class="user-email" id="userEmail"></span>
      <button onclick="logout()">Sign Out</button>
    </div>
  </div>

  <div class="main">
    <div class="section-header"><h2>My Videos</h2></div>
    <div class="message" id="message"></div>

    <div class="upload-area" id="uploadArea" onclick="document.getElementById('fileInput').click()">
      <div class="icon">🎬</div>
      <p>Click to upload or drag & drop your video</p>
      <span>MP4, MOV, AVI, MKV — Max 10GB</span>
      <br><br>
      <button class="btn-primary" onclick="event.stopPropagation(); document.getElementById('fileInput').click()">Choose File</button>
    </div>
    <input type="file" id="fileInput" accept="video/*" onchange="uploadVideo(this.files[0])">

    <div class="progress-container" id="progressContainer">
      <div class="progress-label">
        <span id="progressFilename">Uploading...</span>
        <span id="progressPercent">0%</span>
      </div>
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
    </div>

    <div id="videosContainer">
      <div class="empty-state"><div class="icon">🎬</div><p>No videos yet. Upload your first video!</p></div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://pdttjblnvxoitskhdtro.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vxcNOoezd_FKxKWmWj-rZQ_w3IrSMaG';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
    const SERVER_URL = 'https://api.castloop.com';
    const API_KEY = 'castloop-secret-2024';
    let currentUser = null;

    async function init() {
      const { data: { user } } = await client.auth.getUser();
      if (!user) { window.location.href = 'login.html'; return; }
      currentUser = user;
      document.getElementById('userEmail').textContent = user.email;
      await loadVideos();
    }

    async function loadVideos() {
      const res = await fetch(`${SERVER_URL}/videos`, {
        headers: { 'x-api-key': API_KEY, 'x-user-id': currentUser.id }
      });
      const videos = await res.json();
      renderVideos(videos);
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      if (bytes < 1024 * 1024 * 1024) return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
      return (bytes / (1024 * 1024 * 1024)).toFixed(2) + ' GB';
    }

    function renderVideos(videos) {
      const container = document.getElementById('videosContainer');
      if (!videos.length) {
        container.innerHTML = `<div class="empty-state"><div class="icon">🎬</div><p>No videos yet. Upload your first video!</p></div>`;
        return;
      }
      container.innerHTML = `<div class="videos-grid">${videos.map(v => `
        <div class="video-card">
          <div class="video-icon">🎬</div>
          <div class="video-original-name">${v.originalName || v.filename}</div>
          ${v.size ? `<div class="video-size">${formatSize(v.size)}</div>` : ''}
          <div class="video-path">${v.path}</div>
          <div class="video-actions">
            <button class="btn-copy" onclick="copyPath('${v.path}', this)">📋 Copy Path</button>
            <button class="btn-delete" onclick="deleteVideo('${v.filename}')">Delete</button>
          </div>
        </div>`).join('')}
      </div>`;
    }

    async function uploadVideo(file) {
      if (!file) return;
      const progressContainer = document.getElementById('progressContainer');
      const progressFill = document.getElementById('progressFill');
      const progressPercent = document.getElementById('progressPercent');
      const progressFilename = document.getElementById('progressFilename');
      progressContainer.classList.add('active');
      progressFilename.textContent = file.name;
      progressFill.style.width = '0%';

      const formData = new FormData();
      formData.append('video', file);
      formData.append('originalName', file.name);

      const xhr = new XMLHttpRequest();
      xhr.open('POST', `${SERVER_URL}/upload`);
      xhr.setRequestHeader('x-api-key', API_KEY);
      xhr.setRequestHeader('x-user-id', currentUser.id);

      xhr.upload.onprogress = (e) => {
        if (e.lengthComputable) {
          const pct = Math.round((e.loaded / e.total) * 100);
          progressFill.style.width = pct + '%';
          progressPercent.textContent = pct + '%';
        }
      };

      xhr.onload = async () => {
        progressContainer.classList.remove('active');
        if (xhr.status === 200) {
          showMessage('✅ Video uploaded: ' + file.name, 'success');
          await loadVideos();
        } else {
          showMessage('Upload failed. Try again.', 'error');
        }
      };

      xhr.onerror = () => {
        progressContainer.classList.remove('active');
        showMessage('Upload failed. Check server connection.', 'error');
      };

      xhr.send(formData);
    }

    async function deleteVideo(filename) {
      if (!confirm('Delete this video?')) return;
      const res = await fetch(`${SERVER_URL}/videos/${encodeURIComponent(filename)}`, {
        method: 'DELETE',
        headers: { 'x-api-key': API_KEY, 'x-user-id': currentUser.id }
      });
      if (res.ok) { showMessage('Video deleted.', 'success'); await loadVideos(); }
    }

    function copyPath(path, btn) {
      navigator.clipboard.writeText(path);
      const original = btn.textContent;
      btn.textContent = '✅ Copied!';
      btn.style.background = '#064e3b';
      setTimeout(() => { btn.textContent = original; btn.style.background = ''; }, 2000);
    }

    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = `message ${type}`;
      setTimeout(() => { msg.className = 'message'; }, 4000);
    }

    const uploadArea = document.getElementById('uploadArea');
    uploadArea.addEventListener('dragover', (e) => { e.preventDefault(); uploadArea.classList.add('dragover'); });
    uploadArea.addEventListener('dragleave', () => uploadArea.classList.remove('dragover'));
    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.classList.remove('dragover');
      const file = e.dataTransfer.files[0];
      if (file) uploadVideo(file);
    });

    async function logout() { await client.auth.signOut(); window.location.href = 'login.html'; }

    init();
  </script>
</body>
</html>
