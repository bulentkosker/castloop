<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castreo - Login</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1a1a2e;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    }
    .logo {
      text-align: center;
      margin-bottom: 32px;
    }
    .logo h1 {
      font-size: 28px;
      font-weight: 700;
      color: #6366f1;
    }
    .logo p {
      color: #888;
      font-size: 14px;
      margin-top: 4px;
    }
    .form-group {
      margin-bottom: 16px;
    }
    label {
      display: block;
      font-size: 13px;
      color: #aaa;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 12px 16px;
      background: #0f0f1a;
      border: 1px solid #2a2a3e;
      border-radius: 8px;
      color: #fff;
      font-size: 14px;
      outline: none;
      transition: border 0.2s;
    }
    input:focus {
      border-color: #6366f1;
    }
    button {
      width: 100%;
      padding: 13px;
      background: #6366f1;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      margin-top: 8px;
      transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    .toggle {
      text-align: center;
      margin-top: 20px;
      font-size: 13px;
      color: #888;
    }
    .toggle a {
      color: #6366f1;
      cursor: pointer;
      text-decoration: none;
    }
    .message {
      text-align: center;
      font-size: 13px;
      margin-top: 12px;
      min-height: 20px;
      color: #f87171;
    }
    .message.success { color: #34d399; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Castreo</h1>
      <p>24/7 Live Stream Platform</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="handleAuth()">Sign In</button>

    <div class="toggle">
      No account? <a onclick="toggleMode()">Sign up free</a>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://pdttjblnvxoitskhdtro.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vxcNOoezd_FKxKWmWj-rZQ_w3IrSMaG';
    const supabase = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignUp = false;

    function toggleMode() {
      isSignUp = !isSignUp;
      document.querySelector('button').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      document.querySelector('.toggle').innerHTML = isSignUp
        ? 'Already have an account? <a onclick="toggleMode()">Sign in</a>'
        : 'No account? <a onclick="toggleMode()">Sign up free</a>';
      document.getElementById('message').textContent = '';
    }

    async function handleAuth() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');

      if (!email || !password) {
        msg.textContent = 'Please fill in all fields.';
        return;
      }

      if (isSignUp) {
        const { error } = await supabase.auth.signUp({ email, password });
        if (error) {
          msg.textContent = error.message;
        } else {
          msg.className = 'message success';
          msg.textContent = 'Check your email to confirm your account!';
        }
      } else {
        const { error } = await supabase.auth.signInWithPassword({ email, password });
        if (error) {
          msg.textContent = error.message;
        } else {
          window.location.href = 'dashboard.html';
        }
      }
    }
  </script>
</body>
</html>
