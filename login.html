<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Castloop - Login</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg%20xmlns%3D%27http%3A//www.w3.org/2000/svg%27%20viewBox%3D%270%200%20100%20100%27%3E%0A%20%20%3Cdefs%3E%0A%20%20%20%20%3ClinearGradient%20id%3D%27g%27%20x1%3D%270%25%27%20y1%3D%270%25%27%20x2%3D%27100%25%27%20y2%3D%27100%25%27%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%270%25%27%20style%3D%27stop-color%3A%25236366f1%27/%3E%0A%20%20%20%20%20%20%3Cstop%20offset%3D%27100%25%27%20style%3D%27stop-color%3A%2523818cf8%27/%3E%0A%20%20%20%20%3C/linearGradient%3E%0A%20%20%3C/defs%3E%0A%20%20%3Crect%20width%3D%27100%27%20height%3D%27100%27%20rx%3D%2722%27%20fill%3D%27url%28%2523g%29%27/%3E%0A%20%20%3Cpath%20d%3D%27M20%2050%20Q32%2028%2050%2050%20Q68%2072%2080%2050%27%20stroke%3D%27white%27%20stroke-width%3D%277%27%20fill%3D%27none%27%20stroke-linecap%3D%27round%27%20stroke-linejoin%3D%27round%27/%3E%0A%20%20%3Ccircle%20cx%3D%2750%27%20cy%3D%2750%27%20r%3D%277%27%20fill%3D%27white%27/%3E%0A%20%20%3Ccircle%20cx%3D%2720%27%20cy%3D%2750%27%20r%3D%274%27%20fill%3D%27white%27%20opacity%3D%270.7%27/%3E%0A%20%20%3Ccircle%20cx%3D%2780%27%20cy%3D%2750%27%20r%3D%274%27%20fill%3D%27white%27%20opacity%3D%270.7%27/%3E%0A%3C/svg%3E">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f1a;
      color: #fff;
      height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .container {
      background: #1a1a2e;
      padding: 40px;
      border-radius: 16px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.15);
    }
    .logo { text-align: center; margin-bottom: 32px; }
    .logo h1 { font-size: 28px; font-weight: 700; color: #6366f1; }
    .logo p { color: #888; font-size: 14px; margin-top: 4px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #aaa; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px;
      background: #0f0f1a; border: 1px solid #2a2a3e;
      border-radius: 8px; color: #fff; font-size: 14px;
      outline: none; transition: border 0.2s;
    }
    input:focus { border-color: #6366f1; }
    button {
      width: 100%; padding: 13px; background: #6366f1;
      color: #fff; border: none; border-radius: 8px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      margin-top: 8px; transition: background 0.2s;
    }
    button:hover { background: #4f46e5; }
    .divider {
      display: flex; align-items: center; gap: 12px; margin: 20px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #2a2a3e;
    }
    .divider span { color: #555; font-size: 12px; }
    .btn-google {
      width: 100%; padding: 13px; background: #fff; color: #333;
      border: none; border-radius: 8px; font-size: 15px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: center; gap: 10px; transition: background 0.2s;
    }
    .btn-google:hover { background: #f1f1f1; }
    .btn-google svg { width: 20px; height: 20px; }
    .toggle { text-align: center; margin-top: 20px; font-size: 13px; color: #888; }
    .toggle a { color: #6366f1; cursor: pointer; text-decoration: none; }
    .message { text-align: center; font-size: 13px; margin-top: 12px; min-height: 20px; color: #f87171; }
    .message.success { color: #34d399; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">
      <h1>Castloop</h1>
      <p>24/7 Live Stream Platform</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="email" placeholder="you@example.com">
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" id="password" placeholder="••••••••">
    </div>

    <button onclick="handleAuth()" id="authBtn">Sign In</button>

    <div class="divider"><span>or</span></div>

    <button class="btn-google" onclick="signInWithGoogle()">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Continue with Google
    </button>

    <div class="toggle">
      No account? <a onclick="toggleMode()">Sign up free</a>
    </div>

    <div class="message" id="message"></div>
  </div>

  <script>
    const SUPABASE_URL = 'https://pdttjblnvxoitskhdtro.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_vxcNOoezd_FKxKWmWj-rZQ_w3IrSMaG';
    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isSignUp = false;

    function toggleMode() {
      isSignUp = !isSignUp;
      document.getElementById('authBtn').textContent = isSignUp ? 'Sign Up' : 'Sign In';
      document.querySelector('.toggle').innerHTML = isSignUp
        ? 'Already have an account? <a onclick="toggleMode()">Sign in</a>'
        : 'No account? <a onclick="toggleMode()">Sign up free</a>';
      document.getElementById('message').textContent = '';
    }

    async function signInWithGoogle() {
      const { error } = await client.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo: 'https://castloop.vercel.app/dashboard.html' }
      });
      if (error) {
        document.getElementById('message').textContent = error.message;
      }
    }

    async function handleAuth() {
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;
      const msg = document.getElementById('message');
      if (!email || !password) { msg.textContent = 'Please fill in all fields.'; return; }
      if (isSignUp) {
        const { error } = await client.auth.signUp({ email, password });
        if (error) { msg.textContent = error.message; }
        else { msg.className = 'message success'; msg.textContent = 'Check your email to confirm your account!'; }
      } else {
        const { error } = await client.auth.signInWithPassword({ email, password });
        if (error) { msg.textContent = error.message; }
        else { window.location.href = 'dashboard.html'; }
      }
    }
  </script>
</body>
</html>
